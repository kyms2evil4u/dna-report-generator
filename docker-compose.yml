# ─────────────────────────────────────────────────────────────────
# DNA Report Generator — Docker Compose Stack
#
# Services:
#   web       — Flask app (Gunicorn, 4 workers)
#   postgres  — Report metadata + variant storage
#   redis     — Report data cache + task queue
#   nginx     — Reverse proxy + static file serving
#
# Usage:
#   docker compose up -d            # start all services
#   docker compose logs -f web      # tail app logs
#   docker compose down -v          # stop + remove volumes
# ─────────────────────────────────────────────────────────────────

services:

  # ── Web Application ────────────────────────────────────────────
  web:
    build: .
    container_name: dna_web
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql://dna_user:${POSTGRES_PASSWORD:-dna_pass}@postgres:5432/dna_reports
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_FOLDER=/app/uploads
      - REPORTS_FOLDER=/app/reports_output
      - PORT=5000
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports_output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dna_net
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dna_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dna_reports
      POSTGRES_USER:     dna_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dna_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - dna_net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dna_user -d dna_reports"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dna_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - dna_net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: dna_nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/dna.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - web
    networks:
      - dna_net

# ── Volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads:
  reports:

# ── Networks ───────────────────────────────────────────────────────
networks:
  dna_net:
    driver: bridge
