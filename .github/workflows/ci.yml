name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-mock pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-omit="tests/*,deploy/*,data/sample_generator.py" \
            --cov-report=term-missing \
            --cov-report=xml \
            -v
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key-not-for-production

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install flake8 ruff

      - name: Run ruff (fast linter)
        run: ruff check . --ignore E501,W503

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=.git,__pycache__,deploy,templates

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dna-report-generator:ci .

      - name: Verify image starts
        run: |
          docker run -d \
            --name dna_test \
            -e SECRET_KEY=ci-test \
            -e FLASK_ENV=production \
            -p 5000:5000 \
            dna-report-generator:ci
          sleep 8
          curl -f http://localhost:5000/api/health || (docker logs dna_test && exit 1)
          docker stop dna_test
