user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# Increase for high-concurrency upload scenarios
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Gzip (for API responses / reports, NOT raw DNA uploads) ──
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript;

    # ── Large upload temp storage ─────────────────────────────────
    # Must match client_body_temp_path in dna.conf
    client_body_temp_path  /tmp/nginx_uploads 1 2;

    # ── Rate limiting (protect API, not upload endpoint) ─────────
    # Upload endpoint rate limiting is intentionally light — one DNA
    # file per request is inherently self-throttling.
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

    include /etc/nginx/conf.d/*.conf;
}
