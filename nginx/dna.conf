upstream dna_app {
    server web:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Large file upload support ────────────────────────────────
    # Raw whole-genome VCFs can exceed 600 MB uncompressed.
    # Set to 0 to delegate size enforcement to Flask (cleaner error msgs).
    client_max_body_size 0;

    # Allow slow uploads on large files (700 MB on a slow connection
    # can take 10+ minutes). 1800s = 30 min hard ceiling.
    client_body_timeout       1800s;
    client_header_timeout     60s;
    send_timeout              1800s;

    # Buffer large request bodies to a temp file rather than RAM.
    # 1m = keep up to 1 MB in RAM, overflow to disk.
    client_body_buffer_size   1m;
    client_body_temp_path     /tmp/nginx_uploads 1 2;

    # ── Proxy settings ───────────────────────────────────────────
    location / {
        proxy_pass              http://dna_app;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";

        # Match client timeouts — long enough for slow uploads + processing
        proxy_connect_timeout   60s;
        proxy_send_timeout      1800s;
        proxy_read_timeout      1800s;

        # Buffering: disable for uploads so bytes reach Flask as they arrive
        proxy_request_buffering off;
        proxy_buffering         off;
    }

    # ── Upload endpoint — dedicated large-file settings ──────────
    location /api/analyze {
        proxy_pass              http://dna_app;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Stream directly to Flask — do not buffer entire body in Nginx
        proxy_request_buffering off;
        proxy_buffering         off;

        # Extended timeouts for very large files
        proxy_connect_timeout   60s;
        proxy_send_timeout      3600s;
        proxy_read_timeout      3600s;
    }

    # ── Health check — no rate limiting, fast timeout ────────────
    location /api/health {
        proxy_pass            http://dna_app;
        proxy_read_timeout    10s;
        proxy_connect_timeout 5s;
        access_log            off;
    }
}
