upstream dna_app {
    server web:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Max upload size (100MB for large DNA files)
    client_max_body_size 100M;
    client_body_timeout  120s;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Upload endpoint — rate limited, longer timeout for large files
    location /api/analyze {
        limit_req zone=upload_limit burst=3 nodelay;
        proxy_pass         http://dna_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # General API endpoints
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://dna_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Report downloads (PDF can be large)
    location ~ ^/report/.+/(pdf|html|json)$ {
        proxy_pass         http://dna_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # All other routes
    location / {
        proxy_pass         http://dna_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}
