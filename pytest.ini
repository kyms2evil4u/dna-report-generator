[pytest]
pythonpath = .
testpaths        = tests
python_files     = test_*.py
python_classes   = Test*
python_functions = test_*

# Show short summary for all failures/errors
addopts =
    -v
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    slow:       marks tests as slow (deselect with -m "not slow")
    integration: marks tests that need real external services
    unit:       marks pure unit tests (no I/O, no network)

# Fail fast on first failure during development
# (comment out in CI for full results)
# addopts = -x
